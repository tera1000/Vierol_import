# Meta-Schema fuer alle Konfigurationsdateien im Katalog.
# JSON-Schema (Draft 2020-12), aber in YAML notiert.
#
# Prueft die Struktur einer Konfiguration BEIM `validate-config`-Aufruf,
# damit Tippfehler nicht erst zur Laufzeit auffallen.

$schema: "https://json-schema.org/draft/2020-12/schema"
title: "Vierol Import Configuration"
type: object

required:
  - name
  - klassifikation
  - parsing
  - validierung
  - mapping
  - zielsystem

properties:
  name:
    type: string
    description: "Interner Name des Inhaltstyps (eindeutig im Katalog)."
  version:
    type: integer
    minimum: 1
  beschreibung:
    type: string

  klassifikation:
    type: object
    required: [dateiname_muster, pflicht_spalten]
    properties:
      dateiname_muster:
        type: string
      pflicht_spalten:
        type: array
        items: { type: string }
      min_match_score:
        type: number
        minimum: 0
        maximum: 1

  parsing:
    type: object
    properties:
      trennzeichen: { type: string }
      encoding: { type: string }
      header_zeile: { type: integer, minimum: 1 }

  validierung:
    type: object
    description: "Frictionless-kompatibles Tabellen-Schema."

  mapping:
    type: object
    required: [felder]
    properties:
      ziel_modell: { type: string }
      felder:
        type: object
        additionalProperties: { type: string }
      konstanten:
        type: object

  zielsystem:
    type: object
    required: [tabelle]
    properties:
      typ: { type: string }
      schema: { type: string }
      tabelle: { type: string }
      load_strategie:
        type: string
        enum: [append, replace, upsert]
